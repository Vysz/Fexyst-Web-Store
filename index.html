<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEXYST | Custom Caps</title>
    
    <!-- Google Fonts: Michroma (Y2K Wide), Space Mono (Punk Terminal), and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Michroma&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Brutalist Dark Mode */
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --muted-text: #888888;
            --border-color: #444444;
            --accent-color: #ffffff;
            --punk-red: #ff003c; /* Kept exclusively for the price */
            --font-display: 'Michroma', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'Space Mono', monospace; /* New Font for UI */
            --transition: all 0.2s ease;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            line-height: 1.5;
            /* Subtle White Waves Background */
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 10 Q 30 0, 60 10 T 120 10' fill='none' stroke='rgba(255, 255, 255, 0.1)' stroke-width='0.5'/%3E%3C/svg%3E");
            background-size: 120px 20px;
        }

        /* Typography */
        h1, h2, h3, .logo {
            font-family: var(--font-display);
            text-transform: uppercase;
        }

        .nav-btn, .buy-btn, .lang-select {
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        /* Layout & Header */
        header {
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background-color: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            /* Removed the red punk offset shadow for a cleaner, high-end look */
        }

        /* Controls: Language & Navigation */
        .controls-container {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .lang-select {
            background: transparent;
            color: var(--muted-text);
            border: 1px solid var(--border-color);
            padding: 0.5rem;
            font-size: 0.7rem;
            cursor: pointer;
            outline: none;
        }

        .lang-select:hover {
            color: var(--text-color);
            border-color: var(--text-color);
        }

        .lang-select option {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .nav-tabs {
            display: flex;
            gap: 1.5rem;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--muted-text);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            padding: 0.5rem 0;
            transition: var(--transition);
        }

        .nav-btn:hover {
            color: var(--text-color);
        }

        .nav-btn.active {
            color: var(--text-color);
            font-weight: bold;
        }

        /* Y2K Terminal Brackets for active tabs - Changed to white */
        .nav-btn.active::before { content: "[ "; color: var(--text-color); }
        .nav-btn.active::after { content: " ]"; color: var(--text-color); }

        /* Main Content & Grids */
        main {
            padding: 4rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section {
            display: none; /* Hidden by default, JS handles visibility */
            animation: fadeIn 0.4s ease forwards;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 3rem 2rem;
        }

        /* Product Cards (Brutalist style) */
        .product-card {
            border: 2px solid var(--border-color); /* Thicker border */
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            background: var(--bg-color); /* Hide grid/waves behind card */
        }

        .product-card:hover {
            border-color: var(--text-color);
            transform: translate(-4px, -4px); /* Lift the card */
            box-shadow: 4px 4px 0px var(--text-color); /* Brutalist white shadow */
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-bottom: 2px solid var(--border-color);
            background-color: #111;
            filter: grayscale(100%) contrast(120%); /* Raw, gritty initial look */
            transition: var(--transition);
        }

        .product-card:hover .product-image {
            filter: grayscale(0%) contrast(100%); /* Reveal color on hover */
        }

        .product-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex-grow: 1;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .product-title {
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
        }

        .product-price {
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: var(--punk-red);
            font-weight: bold;
        }

        /* Buttons */
        .buy-btn {
            margin-top: auto;
            width: 100%;
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 1rem;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .buy-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: inset 0 0 0 4px var(--bg-color); /* Inside wireframe effect */
        }

        .buy-btn.sold-out {
            color: var(--muted-text);
            border-style: dashed;
            cursor: not-allowed;
            pointer-events: none;
        }

        .buy-btn.sold-out:hover {
            background: transparent;
            color: var(--muted-text);
        }

        /* Portfolio Specific */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1rem;
        }
        
        .portfolio-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            aspect-ratio: 4/5;
            border: 1px solid var(--border-color);
        }

        /* RTL Specific Adjustments */
        [dir="rtl"] .logo {
            letter-spacing: 0; /* Hebrew looks bad with wide letter spacing */
        }
        [dir="rtl"] h1, [dir="rtl"] h2, [dir="rtl"] .nav-btn, [dir="rtl"] .buy-btn {
             letter-spacing: 0;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1.5rem;
                padding: 1rem;
            }
            .controls-container {
                width: 100%;
                justify-content: space-between;
            }
            .nav-tabs {
                gap: 1rem;
            }
            .nav-btn {
                font-size: 0.7rem;
            }
            .grid-container, .portfolio-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FEXYST</div>
        <div class="controls-container">
            <nav class="nav-tabs">
                <button class="nav-btn active" data-target="instock" data-i18n="tab_instock">IN STOCK</button>
                <button class="nav-btn" data-target="sold" data-i18n="tab_sold">SOLD</button>
                <button class="nav-btn" data-target="portfolio" data-i18n="tab_portfolio">PORTFOLIO</button>
            </nav>
            <select class="lang-select" id="lang-switch">
                <option value="en">EN</option>
                <option value="ru">RU</option>
                <option value="he">HE</option>
            </select>
        </div>
    </header>

    <main>
        <!-- IN STOCK SECTION -->
        <section id="instock" class="section active">
            <div class="grid-container">
                <!-- Product Card 1 -->
                <article class="product-card">
                    <!-- Placeholder images used for development -->
                    <img src="https://placehold.co/600x600/111/555?text=SPIKED+CAP+01" alt="Spiked Cap" class="product-image">
                    <div class="product-info">
                        <div class="product-header">
                            <h2 class="product-title">V1 AUDI DISTRESSED</h2>
                            <span class="product-price">₪350</span>
                        </div>
                        <p style="font-size: 0.8rem; color: var(--muted-text);">Hand-distressed, metal spikes, custom hardware.</p>
                        <!-- Stripe Payment Link Placeholder -->
                        <a href="#" class="buy-btn" data-i18n="btn_buy">BUY NOW</a>
                    </div>
                </article>

                <!-- Product Card 2 -->
                <article class="product-card">
                    <img src="https://placehold.co/600x600/111/555?text=CAMO+CROSS+CAP" alt="Camo Cap" class="product-image">
                    <div class="product-info">
                        <div class="product-header">
                            <h2 class="product-title">V2 DESERT CROSS</h2>
                            <span class="product-price">₪400</span>
                        </div>
                        <p style="font-size: 0.8rem; color: var(--muted-text);">Camo base, chain detailing, bone cross.</p>
                        <a href="#" class="buy-btn" data-i18n="btn_buy">BUY NOW</a>
                    </div>
                </article>
            </div>
        </section>

        <!-- SOLD COLLECTION SECTION -->
        <section id="sold" class="section">
            <div class="grid-container">
                <!-- Sold Product 1 -->
                <article class="product-card">
                    <img src="https://placehold.co/600x600/111/555?text=BONE+CAP+SOLD" alt="Bone Cap" class="product-image" style="opacity: 0.6;">
                    <div class="product-info">
                        <div class="product-header">
                            <h2 class="product-title">ARCHIVE BONE SPIKE</h2>
                        </div>
                        <a href="#" class="buy-btn sold-out" data-i18n="btn_soldout">SOLD OUT</a>
                    </div>
                </article>
            </div>
        </section>

        <!-- PORTFOLIO SECTION -->
        <section id="portfolio" class="section">
            <div class="portfolio-grid">
                 <img src="https://placehold.co/800x1000/111/555?text=EDITORIAL+SHOT+1" alt="Editorial" class="portfolio-img">
                 <img src="https://placehold.co/800x1000/111/555?text=EDITORIAL+SHOT+2" alt="Editorial" class="portfolio-img">
            </div>
        </section>
    </main>

    <script>
        /**
         * FEXYST Logic Engine
         * Handles Tab Switching, i18n Translation, and RTL Layouts.
         */

        // 1. Language Dictionary
        const i18n = {
            en: {
                tab_instock: "IN STOCK",
                tab_sold: "SOLD COLLECTION",
                tab_portfolio: "PORTFOLIO",
                btn_buy: "BUY NOW",
                btn_soldout: "SOLD OUT"
            },
            ru: {
                tab_instock: "В НАЛИЧИИ",
                tab_sold: "ПРОДАНО",
                tab_portfolio: "ПОРТФОЛИО",
                btn_buy: "КУПИТЬ",
                btn_soldout: "НЕТ В НАЛИЧИИ"
            },
            he: {
                tab_instock: "במלאי",
                tab_sold: "נמכר",
                tab_portfolio: "תיק עבודות",
                btn_buy: "קנה עכשיו",
                btn_soldout: "אזל"
            }
        };

        // 2. Tab Navigation Logic
        const navBtns = document.querySelectorAll('.nav-btn');
        const sections = document.querySelectorAll('.section');

        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all buttons and sections
                navBtns.forEach(b => b.classList.remove('active'));
                sections.forEach(s => s.classList.remove('active'));

                // Add active class to clicked button and corresponding section
                btn.classList.add('active');
                const targetId = btn.getAttribute('data-target');
                document.getElementById(targetId).classList.add('active');
            });
        });

        // 3. Translation & RTL Logic
        const langSwitch = document.getElementById('lang-switch');
        const translatableElements = document.querySelectorAll('[data-i18n]');

        function setLanguage(lang) {
            // A. Update Text Content
            const dictionary = i18n[lang];
            translatableElements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dictionary[key]) {
                    el.textContent = dictionary[key];
                }
            });

            // B. Handle Text Direction (RTL for Hebrew)
            if (lang === 'he') {
                document.documentElement.setAttribute('dir', 'rtl');
                document.documentElement.setAttribute('lang', 'he');
            } else {
                document.documentElement.setAttribute('dir', 'ltr');
                document.documentElement.setAttribute('lang', lang);
            }
        }

        // Listen for language changes
        langSwitch.addEventListener('change', (e) => {
            setLanguage(e.target.value);
        });

        // Initialize default language
        setLanguage('en');

    </script>
</body>
</html>
